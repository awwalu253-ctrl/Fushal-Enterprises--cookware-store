<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Awwal Investment - Email</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap');
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #FFF8F0;
            margin: 0;
            padding: 0;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        
        .header {
            background: linear-gradient(135deg, #2C3E50 0%, #3A281F 100%);
            padding: 30px 20px;
            text-align: center;
        }
        
        .header h1 {
            font-family: 'Playfair Display', Georgia, serif;
            color: white;
            margin: 0;
            font-size: 28px;
            letter-spacing: -0.5px;
        }
        
        .header p {
            color: #F39C12;
            margin: 8px 0 0;
            font-size: 14px;
        }
        
        .content {
            padding: 30px;
            color: #2C3E50;
        }
        
        .footer {
            background: #2C3E50;
            padding: 20px;
            text-align: center;
            color: #EDE0D4;
            font-size: 12px;
        }
        
        .footer a {
            color: #F39C12;
            text-decoration: none;
        }
        
        @media (max-width: 600px) {
            .content {
                padding: 20px;
            }
            .header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body style="font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #FFF8F0; margin: 0; padding: 20px;">
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>Awwal Investment</h1>
            <p>Premium Cooking Utensils</p>
        </div>
        
        <!-- Main Content -->
        <div class="content">
            {% block content %}{% endblock %}
        </div>
        
        <!-- Footer -->
        <div class="footer">
            <p>&copy; 2025 Awwal Investment. All rights reserved.</p>
            <p>Lagos, Nigeria</p>
            <p>
                <a href="#">Unsubscribe</a> | 
                <a href="#">Privacy Policy</a> | 
                <a href="#">Terms of Service</a>
            </p>
        </div>
    </div>
</body>
</html>
